<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Train Ticketing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <div>
            <span class="fw-bold">Logged in as: </span>
            <span sec:authentication="name">User</span>
            <span class="badge bg-info ms-2" sec:authentication="principal.authorities">Role</span>
        </div>
        <div class="d-flex gap-2">
            <div sec:authorize="hasRole('ADMIN')">
                <a href="/admin" class="btn btn-secondary">Admin Panel</a>
            </div>
            <form action="/logout" method="POST">
                <button type="submit" class="btn btn-outline-danger">Logout</button>
            </form>
        </div>
    </div>

    <div th:if="${param.success}" class="alert alert-success" th:text="${param.success}"></div>
    <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>

    <div class="card p-4 mb-4">
        <h3>Find Route</h3>
        <form action="/search" method="GET" class="row g-3">
            <div class="col-md-5">
                <label>From:</label>
                <select name="fromId" class="form-select">
                    <option th:each="s : ${stations}" th:value="${s.id}" th:text="${s.name}"></option>
                </select>
            </div>
            <div class="col-md-5">
                <label>To:</label>
                <select name="toId" class="form-select">
                    <option th:each="s : ${stations}" th:value="${s.id}" th:text="${s.name}"></option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Search</button>
            </div>
        </form>
    </div>

    <div class="card p-4" th:if="${paths != null}">
        <h3>Results</h3>
        <div th:if="${paths.empty}" class="alert alert-warning">
            No route found between selected stations.
        </div>
        <table class="table table-hover" th:unless="${paths.empty}">
            <thead>
            <tr>
                <th>Type</th>
                <th>Trains</th>
                <th>Routes</th>
                <th>Departure</th>
                <th>Seats</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="path : ${paths}">
                <td>
                    <span th:if="${path.direct}" class="badge bg-success">Direct</span>
                    <span th:unless="${path.direct}" class="badge bg-warning text-dark">1 Stop</span>
                </td>
                <td>
                    <div th:each="leg : ${path.legs}" th:text="${leg.train.name}" class="mb-2"></div>
                </td>
                <td>
                    <div th:each="leg : ${path.legs}" th:text="${leg.route.name}" class="mb-2"></div>
                </td>
                <td>
                    <div th:each="leg : ${path.legs}" th:text="${#temporals.format(leg.departureTime, 'dd-MM-yyyy HH:mm')}" class="mb-2"></div>
                </td>
                <td>
                    <div th:each="leg : ${path.legs}" th:text="${leg.availableSeats}" class="mb-2"></div>
                </td>
                <td>
                    <div th:each="leg : ${path.legs}" class="mb-1">
                        <form action="/book" method="POST" class="d-flex gap-2">
                            <input type="hidden" name="scheduleId" th:value="${leg.id}">
                            <input type="hidden" name="startStationId" th:value="${fromId}">
                            <input type="hidden" name="endStationId" th:value="${toId}">
                            <input type="email" name="email" th:value="${#authentication.name}" readonly required class="form-control form-control-sm" style="width: 150px;">
                            <input type="number" name="seats" value="1" min="1" class="form-control form-control-sm" style="width: 60px;">
                            <button type="submit" class="btn btn-primary btn-sm">Book</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
