<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Home</a>
        <span class="navbar-text">Admin Control Panel</span>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row mb-4">

        <div class="col-md-3">
            <div class="card p-3 shadow-sm h-100">
                <h3>Add Train</h3>
                <form action="/admin/trains/add" method="POST">
                    <input type="text" name="name" placeholder="Train Name" required class="form-control mb-2">
                    <input type="number" name="capacity" placeholder="Capacity" required class="form-control mb-2">
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </form>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow-sm h-100">
                <h3>Add Station</h3>
                <form action="/admin/stations/add" method="POST">
                    <input type="text" name="name" placeholder="Station Name" required class="form-control mb-2">
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </form>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow-sm h-100">
                <h3>Add Route</h3>
                <form action="/admin/routes/add" method="POST">
                    <input type="text" name="name" placeholder="Route Name" required class="form-control mb-2">
                    <select name="stationIds" class="form-select mb-2" multiple required style="height: 80px;">
                        <option th:each="s : ${stations}" th:value="${s.id}" th:text="${s.name}"></option>
                    </select>
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </form>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3 shadow-sm h-100">
                <h3>Add Schedule</h3>
                <form action="/admin/schedules/add" method="POST">
                    <select name="trainId" class="form-select mb-2" required>
                        <option value="" disabled selected>Select Train</option>
                        <option th:each="t : ${trains}" th:value="${t.id}" th:text="${t.name}"></option>
                    </select>
                    <select name="routeId" class="form-select mb-2" required>
                        <option value="" disabled selected>Select Route</option>
                        <option th:each="r : ${routes}" th:value="${r.id}" th:text="${r.name}"></option>
                    </select>
                    <input type="datetime-local" name="departureTime" required class="form-control mb-2">
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </form>
            </div>
        </div>

    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card p-3 shadow-sm mb-4">
                <h3>Manage Trains</h3>
                <table class="table table-sm">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t : ${trains}">
                        <td th:text="${t.name}"></td>
                        <td>
                            <span th:if="${t.isDelayed}" class="badge bg-danger">Delayed</span>
                            <span th:unless="${t.isDelayed}" class="badge bg-success">On Time</span>
                        </td>
                        <td>
                            <form action="/admin/delay" method="POST" class="d-inline">
                                <input type="hidden" name="trainId" th:value="${t.id}">
                                <button class="btn btn-warning btn-sm">Delay</button>
                            </form>
                            <form action="/admin/trains/delete" method="POST" class="d-inline">
                                <input type="hidden" name="id" th:value="${t.id}">
                                <button class="btn btn-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3 shadow-sm">
                <h3>All Bookings</h3>
                <table class="table table-sm">
                    <thead>
                    <tr>
                        <th>Email</th>
                        <th>Train</th>
                        <th>Tickets</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="b : ${bookings}">
                        <td th:text="${b.customerEmail}"></td>
                        <td th:text="${b.schedule.train.name}"></td>
                        <td th:text="${b.numberOfTickets}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
